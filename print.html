<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print — Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="print.css">
  <link rel="stylesheet" href="https://use.typekit.net/gda8qnk.css">
  <svg style="position:absolute;width:0;height:0;">
    <filter id="ink-texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
    </filter>
  </svg>
</head>
<body>

  <nav class="folders-nav">
    <a class="folder-arrow" href="web.html">← Web</a>
    <div class="folders-nav-center">
      <a href="branding.html" class="folder-dot">Branding</a>
      <a href="social.html"   class="folder-dot">Social</a>
      <a href="web.html"      class="folder-dot">Web</a>
      <a href="print.html"    class="folder-dot active">Print</a>
    </div>
    <a class="folder-arrow" href="index.html#works">Works →</a>
  </nav>

  <section id="print-hero">
    <span class="hero-label">Affiches · Posters · Édition</span>
    <h1 class="hero-title">
      <span class="hero-bold">PR</span><span class="hero-script">int</span>
    </h1>
    <p class="hero-desc">[Une sélection de travaux imprimés]</p>
  </section>

  <div id="print-grid"></div>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button id="lightbox-close">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M4 4L16 16M16 4L4 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="lightbox-inner">
      <div id="lb-visual"><img id="lb-img" src="" alt=""/></div>
      <div id="lb-info">
        <span id="lb-num"></span>
        <h2 id="lb-title"></h2>
        <p id="lb-desc"></p>
        <div id="lb-details"></div>
        <div id="lb-tags"></div>
      </div>
    </div>
    <div id="lb-nav">
      <button id="lb-prev">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
          <path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Précédent
      </button>
      <span id="lb-counter"></span>
      <button id="lb-next">
        Suivant
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
          <path d="M7 4L13 10L7 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="print.js"></script>
</body>
</html>
