<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Design — Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="web.css">
  <link rel="stylesheet" href="https://use.typekit.net/gda8qnk.css">

  <svg style="position:absolute;width:0;height:0;">
    <filter id="ink-texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
    </filter>
  </svg>
</head>
<body>

  <!-- NAV DOSSIERS -->
  <nav class="folders-nav">
    <a class="folder-arrow" href="social.html">← Social</a>
    <div class="folders-nav-center">
      <a href="branding.html" class="folder-dot">Branding</a>
      <a href="social.html"   class="folder-dot">Social</a>
      <a href="web.html"      class="folder-dot active">Web</a>
      <a href="print.html"    class="folder-dot">Print</a>
    </div>
    <a class="folder-arrow" href="print.html">Print →</a>
  </nav>

  <!-- MENU LATÉRAL FIXE -->
  <aside id="side-nav">
    <span class="side-nav-label">Projets</span>
    <ul id="side-nav-list">
      <!-- Injecté par JS -->
    </ul>
  </aside>

  <!-- HERO -->
  <section id="web-hero">
    <div class="web-hero-inner">
      <span class="hero-label">Web Design · UX/UI</span>
      <h1 class="hero-title">
        <span class="hero-bold">W</span><span class="hero-script">eb</span>
      </h1>
      <p class="hero-desc">[Maquettes de sites, interfaces et expériences digitales]</p>
    </div>
  </section>

  <!-- PROJETS -->
  <div id="web-projects">
    <!-- Injecté par JS -->
  </div>

  <!-- LIGHTBOX PLEIN ÉCRAN -->
  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button id="lightbox-close" aria-label="Fermer">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M4 4L16 16M16 4L4 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Infos projet dans la lightbox -->
    <div id="lightbox-info">
      <span id="lb-num"></span>
      <h2 id="lb-title"></h2>
      <p  id="lb-desc"></p>
      <div id="lb-tags"></div>
    </div>

    <!-- Image scrollable -->
    <div id="lightbox-scroll">
      <img id="lightbox-img" src="" alt="" />
    </div>

    <!-- Navigation entre projets dans la lightbox -->
    <div id="lb-nav">
      <button id="lb-prev">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Précédent
      </button>
      <button id="lb-next">
        Suivant
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <path d="M7 4L13 10L7 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="web.js"></script>
</body>
</html>
